services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: innout
      MYSQL_ROOT_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 25s

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_DATABASE: innout
      DB_USERNAME: root
      DB_PASSWORD: secret
      CACHE_DRIVER: file
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./storage:/var/www/html/storage
      # Não montar bootstrap/cache: o cache de config do host (config.php) fixa DB_HOST=127.0.0.1 e o app no container deixa de ver o serviço "mysql".

volumes:
  mysql_data:
